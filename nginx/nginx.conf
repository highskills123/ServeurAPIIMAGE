worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Basic performance settings
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting zones (anti-abuse)
    # 20 requests/second per IP on the API, with burst buffer of 40
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    # Stricter limit for the generate endpoint: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=generate_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name _;

        # Proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Image generation endpoint – stricter limit (must be before the general /api/ block)
        location /api/images/generate {
            limit_req zone=generate_limit burst=10 nodelay;
            proxy_pass http://backend:8000/images/generate;
        }

        # General API – apply broad rate limit
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://backend:8000/;
        }

        # Serve generated images directly from disk (CDN-like)
        location /files/images/ {
            alias /data/images/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Redirect bare root to the API docs
        location = / {
            return 302 /api/docs;
        }

        # Default – proxy everything else to the backend
        location / {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://backend:8000;
        }
    }
}
