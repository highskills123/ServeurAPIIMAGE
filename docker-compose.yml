version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
    depends_on:
      - postgres
      - redis

  worker_gpu0:
    build:
      context: ./worker
    env_file: .env
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      WORKER_NAME: "gpu0"
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
    depends_on:
      - redis
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  worker_gpu1:
    build:
      context: ./worker
    env_file: .env
    environment:
      CUDA_VISIBLE_DEVICES: "1"
      WORKER_NAME: "gpu1"
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
    depends_on:
      - redis
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  pgdata:
